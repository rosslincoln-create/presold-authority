<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Asset Library — Pre-Sold Authority</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style-premium.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-text-primary: #f4f4f5;
      --color-text-secondary: #a1a1aa;
    }
    body {
      background: #09090b; color: var(--color-text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; min-height: 100vh;
    }

    .sidebar {
      width: 240px; min-height: 100vh;
      background: #111113; border-right: 1px solid #27272a;
      display: flex; flex-direction: column;
      padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: #a1a1aa; text-decoration: none; font-size: 14px;
      font-weight: 500; margin-bottom: 4px;
      transition: all 0.15s;
    }
    .nav-item:hover { background: #18181b; color: #f4f4f5; }
    .nav-item.active {
      background: #1c1917; color: #fbbf24;
      border-left: 3px solid #fbbf24; padding-left: 9px;
    }
    .nav-icon { width: 18px; height: 18px; opacity: 0.8; }
    .sidebar-footer { margin-top: auto; padding-top: 16px; }
    .btn-logout {
      width: 100%; padding: 10px 12px; background: transparent;
      border: 1px solid #3f3f46; color: #a1a1aa; border-radius: 8px;
      cursor: pointer; font-size: 13px; text-align: left;
      transition: all 0.15s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    .main {
      margin-left: 240px; flex: 1; padding: 40px;
      max-width: calc(100vw - 240px);
    }

    .welcome-header { margin-bottom: 28px; }
    .welcome-header h1 { font-size: 28px; font-weight: 700; color: #f4f4f5; }
    .welcome-header p { color: var(--color-text-secondary); margin-top: 4px; font-size: 15px; }

    .assets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .asset-card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px; padding: 24px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .asset-card-row1 {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .asset-name {
      font-size: 16px; font-weight: 600; color: var(--color-text-primary);
      line-height: 1.35;
    }
    .asset-desc {
      font-size: 13px; color: var(--color-text-secondary); line-height: 1.45;
    }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-not-generated { background: #27272a; color: #a1a1aa; }
    .badge-generated { background: #fbbf24; color: #09090b; }
    .badge-outdated { background: #f97316; color: #ffffff; }
    .badge-available { background: #fbbf24; color: #09090b; }

    .version-select {
      margin-top: 4px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #09090b;
      color: #f4f4f5;
      width: 100%;
      max-width: 220px;
      cursor: pointer;
    }
    .version-select:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
    }

    .notice-outdated {
      font-size: 12px; color: #fbbf24; line-height: 1.45;
    }
    .notice-outdated a { color: #fbbf24; font-weight: 600; text-decoration: underline; }
    .notice-muted {
      font-size: 12px; color: var(--color-text-secondary); line-height: 1.45;
    }
    .notice-muted a { color: #fbbf24; text-decoration: none; font-weight: 600; }
    .notice-muted a:hover { text-decoration: underline; }

    .asset-actions {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;
    }
    .btn {
      padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #fbbf24, #fcd34d); color: #09090b;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.05); }
    .btn-primary:disabled {
      background: #27272a; color: #71717a; cursor: not-allowed;
      filter: none;
    }
    .btn-secondary {
      background: transparent; border: 1px solid #3f3f46; color: #f4f4f5;
    }
    .btn-secondary:hover:not(:disabled) { border-color: #fbbf24; color: #fbbf24; }
    .btn-secondary:disabled {
      border-color: #27272a; color: #52525b; cursor: not-allowed;
    }

    .spinner {
      width: 14px; height: 14px; border: 2px solid #27272a;
      border-top-color: #09090b; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .asset-card-error {
      display: none;
      font-size: 12px; color: #fecaca; margin-top: 4px;
    }
    .asset-card-error.visible { display: block; }

    .page-error {
      display: none;
      background: #1c1214;
      border: 1px solid #7f1d1d;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      color: #fecaca;
      font-size: 14px;
    }
    .page-error.visible { display: block; }

    .loading { color: var(--color-text-secondary); font-size: 14px; padding: 20px 0; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; max-width: 100vw; }
      .assets-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <script>
    (function() {
      fetch('/api/auth/check', { credentials: 'include' })
        .then(function(r) {
          if (r.status === 401 || r.status === 403) {
            window.location.href = '/login';
          }
        })
        .catch(function() {});
    })();
  </script>

  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/brand/logo-mark.png" alt="PSA">
      <span class="sidebar-logo-text">Pre-Sold<br>Authority</span>
    </div>
    <a href="/dashboard" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z
                 M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z
                 M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z
                 M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
      </svg>
      Dashboard
    </a>
    <a href="/lessons" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0
                 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Lessons
    </a>
    <a href="/assets" class="nav-item active">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0
                 0l-4-4m4 4V4"/>
      </svg>
      My Assets
    </a>
    <a href="/account" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7
                 7 0 00-7-7z"/>
      </svg>
      Account
    </a>
    <div class="sidebar-footer">
      <button class="btn-logout" type="button" onclick="handleLogout()">Sign out</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-error" id="pageError" role="alert"></div>

    <div class="welcome-header">
      <h1>My Asset Library</h1>
      <p>All your generated authority assets in one place.</p>
    </div>

    <div id="assetsRoot">
      <p class="loading" id="assetsLoading">Loading assets…</p>
    </div>
  </main>

  <script>
    var ASSET_DEFS = [
      { type: 'positioning', title: 'Authority Positioning Statement', desc: 'Positioning statement, differentiators, and boundary line', lessonHref: '/lessons/lesson-4.html', lessonNum: 4, copy: true },
      { type: 'profile-copy', title: 'LinkedIn Profile Copy', desc: 'LinkedIn headline, About section, and pinned post', lessonHref: '/lessons/lesson-5.html', lessonNum: 5, copy: true },
      { type: 'content-pillars', title: 'Content Pillars & Topic Map', desc: '4 content pillars with 40 topic ideas and filter lines', lessonHref: '/lessons/lesson-6.html', lessonNum: 6, copy: false },
      { type: 'posts-10', title: 'First 10 Authority Posts', desc: 'Your first 10 authority posts ready to publish', lessonHref: '/lessons/lesson-7.html', lessonNum: 7, copy: true },
      { type: 'dm-flow', title: 'Inbound DM Flow', desc: 'Inbound DM sequence from first message to call booking', lessonHref: '/lessons/lesson-7.html', lessonNum: 7, copy: true },
      { type: 'boundary-library', title: 'Boundary Language Library', desc: 'Professional phrases for posts, DMs, calls, and objections', lessonHref: '/lessons/lesson-8.html', lessonNum: 8, copy: true },
      { type: 'context-card', title: 'Agent Context Card', desc: 'Your Agent Context Card — the source of truth for all outputs', lessonHref: '/onboarding', lessonNum: null, copy: false },
      { type: '48hr-checklist', title: '48-Hour Fast Start Checklist', desc: 'Your 48-Hour Fast Start action checklist', lessonHref: null, lessonNum: null, copy: false },
      { type: 'one-pager-next', title: 'Client One-Pager: NEXT', desc: 'Client-facing one-pager: what happens next', lessonHref: null, lessonNum: null, copy: false },
      { type: 'one-pager-market', title: 'Client One-Pager: MARKET', desc: 'Client-facing one-pager: your market authority summary', lessonHref: null, lessonNum: null, copy: false },
      { type: 'one-pager-plan', title: 'Client One-Pager: PLAN', desc: 'Client-facing one-pager: your buyer or seller plan', lessonHref: null, lessonNum: null, copy: false }
    ];

    var OUTDATED_LESSON = {
      'positioning': '/lessons/lesson-4.html',
      'profile-copy': '/lessons/lesson-5.html',
      'content-pillars': '/lessons/lesson-6.html',
      'posts-10': '/lessons/lesson-7.html',
      'dm-flow': '/lessons/lesson-7.html',
      'boundary-library': '/lessons/lesson-8.html'
    };

    var OUTDATED_LESSON_NUM = {
      'positioning': 4,
      'profile-copy': 5,
      'content-pillars': 6,
      'posts-10': 7,
      'dm-flow': 7,
      'boundary-library': 8
    };

    function defByType(t) {
      for (var i = 0; i < ASSET_DEFS.length; i++) {
        if (ASSET_DEFS[i].type === t) return ASSET_DEFS[i];
      }
      return { type: t, title: t, desc: '', lessonHref: null, lessonNum: null, copy: false };
    }

    function badgeClass(status) {
      if (status === 'not_generated') return 'badge badge-not-generated';
      if (status === 'outdated') return 'badge badge-outdated';
      if (status === 'available') return 'badge badge-available';
      return 'badge badge-generated';
    }

    function badgeLabel(status) {
      if (status === 'not_generated') return 'Not Generated';
      if (status === 'outdated') return 'Outdated';
      if (status === 'available') return 'Available';
      return 'Generated';
    }

    function canDownload(status) {
      return status === 'generated' || status === 'outdated' || status === 'available';
    }

    function selectedIdForAsset(asset, selectEl) {
      if (selectEl && asset.versions && asset.versions.length > 1) {
        return selectEl.value || null;
      }
      return asset.current_asset_id || null;
    }

    function renderCard(asset) {
      var d = defByType(asset.asset_type);
      var status = asset.status;
      var versions = asset.versions || [];
      var showVersion = versions.length > 1;

      var html = '<div class="asset-card" data-asset-type="' + escapeAttr(asset.asset_type) + '">';
      html += '<div class="asset-card-row1">';
      html += '<div class="asset-name">' + escapeHtml(d.title) + '</div>';
      html += '<span class="' + badgeClass(status) + '">' + escapeHtml(badgeLabel(status)) + '</span>';
      html += '</div>';
      html += '<p class="asset-desc">' + escapeHtml(d.desc) + '</p>';

      if (showVersion) {
        html += '<select class="version-select" aria-label="Version">';
        for (var j = 0; j < versions.length; j++) {
          var v = versions[j];
          var sel = v.is_current ? ' selected' : '';
          var label = 'Version ' + v.version;
          if (v.is_current) label += ' (current)';
          html += '<option value="' + escapeAttr(v.id) + '"' + sel + '>' + escapeHtml(label) + '</option>';
        }
        html += '</select>';
      }

      if (status === 'outdated' && OUTDATED_LESSON[asset.asset_type]) {
        var lh = OUTDATED_LESSON[asset.asset_type];
        var ln = OUTDATED_LESSON_NUM[asset.asset_type] || '';
        html += '<p class="notice-outdated">Your Context Card was updated after this asset was generated. → ';
        html += '<a href="' + escapeAttr(lh) + '">Go to Lesson ' + ln + ' to regenerate</a></p>';
      }

      if (status === 'not_generated') {
        html += '<p class="notice-muted">';
        if (asset.asset_type === 'context-card') {
          html += '<a href="/onboarding">Complete your Agent Context Card</a> to generate this asset.';
        } else if (d.lessonNum != null && d.lessonHref) {
          html += 'Complete <a href="' + escapeAttr(d.lessonHref) + '">Lesson ' + d.lessonNum + '</a> to generate this asset.';
        } else {
          html += 'Complete the relevant lesson to generate this asset.';
        }
        html += '</p>';
      }

      html += '<div class="asset-actions">';
      var dlDisabled = !canDownload(status) ? ' disabled' : '';
      html += '<button type="button" class="btn btn-primary btn-download"' + dlDisabled + '>Download PDF</button>';
      if (d.copy) {
        var cpDisabled = !canDownload(status) ? ' disabled' : '';
        html += '<button type="button" class="btn btn-secondary btn-copy"' + cpDisabled + '>Copy Text</button>';
      }
      html += '</div>';
      html += '<div class="asset-card-error" aria-live="polite"></div>';
      html += '</div>';
      return html;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, '&#39;');
    }

    function wireCard(root, asset) {
      var card = root.querySelector('[data-asset-type="' + asset.asset_type + '"]');
      if (!card) return;
      var selectEl = card.querySelector('.version-select');
      var btnDl = card.querySelector('.btn-download');
      var btnCp = card.querySelector('.btn-copy');
      var errEl = card.querySelector('.asset-card-error');

      function setCardBusy(busy) {
        var dlOk = canDownload(asset.status);
        if (btnDl) btnDl.disabled = !!busy || !dlOk;
        if (btnCp) btnCp.disabled = !!busy || !dlOk;
        if (selectEl) selectEl.disabled = !!busy;
      }

      if (btnDl) {
        btnDl.addEventListener('click', async function() {
          if (!canDownload(asset.status)) return;
          errEl.classList.remove('visible');
          errEl.textContent = '';
          var orig = btnDl.innerHTML;
          btnDl.innerHTML = '<span class="spinner"></span> Generating PDF…';
          setCardBusy(true);
          try {
            var vid = selectedIdForAsset(asset, selectEl);
            var body = {};
            if (vid != null && vid !== '') body.assetId = vid;
            var res = await fetch('/api/assets/' + encodeURIComponent(asset.asset_type) + '/download', {
              method: 'POST',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });
            if (!res.ok) {
              var errText = await res.text().catch(function() { return ''; });
              console.error('[assets] download failed:', res.status, errText);
              throw new Error('PDF failed');
            }
            var blob = await res.blob();
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = asset.asset_type + '.pdf';
            a.click();
            URL.revokeObjectURL(url);
          } catch (e) {
            errEl.textContent = 'PDF generation failed. Please try again.';
            errEl.classList.add('visible');
          } finally {
            btnDl.innerHTML = orig;
            setCardBusy(false);
          }
        });
      }

      if (btnCp) {
        btnCp.addEventListener('click', async function() {
          if (!canDownload(asset.status)) return;
          errEl.classList.remove('visible');
          var origCp = btnCp.textContent;
          try {
            var vid2 = selectedIdForAsset(asset, selectEl);
            var q = vid2 != null && vid2 !== '' ? '?assetId=' + encodeURIComponent(vid2) : '';
            var res2 = await fetch('/api/assets/' + encodeURIComponent(asset.asset_type) + '/text' + q, {
              credentials: 'include'
            });
            if (!res2.ok) throw new Error('copy failed');
            var data = await res2.json();
            await navigator.clipboard.writeText(data.text || '');
            btnCp.textContent = 'Copied ✓';
            setTimeout(function() { btnCp.textContent = origCp; }, 2000);
          } catch (e2) {
            errEl.textContent = 'Could not copy. Please try again.';
            errEl.classList.add('visible');
          }
        });
      }
    }

    async function handleLogout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    }

    async function loadAssets() {
      var root = document.getElementById('assetsRoot');
      var loading = document.getElementById('assetsLoading');
      var pageErr = document.getElementById('pageError');
      try {
        var authRes = await fetch('/api/auth/check', { credentials: 'include' });
        if (authRes.status === 401 || authRes.status === 403) {
          window.location.href = '/login';
          return;
        }
        var res = await fetch('/api/assets', { credentials: 'include' });
        if (res.status === 401 || res.status === 403) {
          window.location.href = '/login';
          return;
        }
        if (!res.ok) {
          pageErr.textContent = 'We could not load your assets. Please refresh and try again.';
          pageErr.classList.add('visible');
          if (loading) loading.remove();
          return;
        }
        var data = await res.json();
        if (loading) loading.remove();
        pageErr.classList.remove('visible');

        var html = '<div class="assets-grid">';
        var list = data.assets || [];
        for (var i = 0; i < list.length; i++) {
          html += renderCard(list[i]);
        }
        html += '</div>';
        root.innerHTML = html;

        for (var k = 0; k < list.length; k++) {
          wireCard(root, list[k]);
        }
      } catch (err) {
        console.error(err);
        pageErr.textContent = 'We could not reach the server. Check your connection and refresh.';
        pageErr.classList.add('visible');
        if (loading) loading.remove();
      }
    }

    loadAssets();
  </script>
</body>
</html>
