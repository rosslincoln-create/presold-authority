<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Pre-Sold Authority System</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style-premium.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(9,9,11,0.6);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-accent-gold);
    }
    .form-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #fbbf24, #fcd34d);
      color: #09090b;
      border: none;
      border-radius: var(--radius-full);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .form-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(251,191,36,0.4); }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .form-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-md);
      padding: 0.875rem 1rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    .form-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--color-text-secondary);
    }
    .form-footer a { color: var(--color-accent-gold); }
    /* Fallback styles if CSS file missing */
    body { background: #09090b; color: #f4f4f5; font-family: system-ui, sans-serif; margin: 0; }
    .brand { font-size: 1.1rem; font-weight: 700; color: #f4f4f5; }
    .brand-accent { color: #fbbf24; }
    :root {
      --color-bg-surface: #18181b;
      --color-border: rgba(255,255,255,0.1);
      --color-text-primary: #f4f4f5;
      --color-text-secondary: #a1a1aa;
      --color-accent-gold: #fbbf24;
      --radius-xl: 1rem;
      --radius-md: 0.5rem;
      --radius-full: 9999px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="text-align:center; margin-bottom:24px;">
          <img src="/assets/brand/logo-full.png" alt="Pre-Sold Authority" style="height:80px; object-fit:contain;">
        </div>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <div class="form-error" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Your password" required autocomplete="current-password">
        </div>
        <button class="form-submit" type="submit" id="submitBtn">Sign In</button>
      </form>

      <div class="form-footer">
        <a href="/forgot-password">Forgot your password?</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      const errorMsg = document.getElementById('errorMsg')

      btn.disabled = true
      btn.textContent = 'Signing in...'
      errorMsg.style.display = 'none'

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        })

        const data = await res.json()

        if (res.ok && data.success) {
          window.location.href = data.redirectTo || '/dashboard'
        } else {
          errorMsg.textContent = data.error || 'Sign in failed. Please try again.'
          errorMsg.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Sign In'
        }
      } catch {
        errorMsg.textContent = 'Connection error. Please try again.'
        errorMsg.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
