<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons — Pre-Sold Authority</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style-premium.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #09090b; color: #f4f4f5; 
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; min-height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      width: 240px; min-height: 100vh;
      background: #111113; border-right: 1px solid #27272a;
      display: flex; flex-direction: column;
      padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: #a1a1aa; text-decoration: none; font-size: 14px;
      font-weight: 500; margin-bottom: 4px;
      transition: all 0.15s;
    }
    .nav-item:hover { background: #18181b; color: #f4f4f5; }
    .nav-item.active { 
      background: #1c1917; color: #fbbf24; 
      border-left: 3px solid #fbbf24; padding-left: 9px;
    }
    .nav-icon { width: 18px; height: 18px; opacity: 0.8; }
    .sidebar-footer { margin-top: auto; padding-top: 16px; }
    .btn-logout {
      width: 100%; padding: 10px 12px; background: transparent;
      border: 1px solid #3f3f46; color: #a1a1aa; border-radius: 8px;
      cursor: pointer; font-size: 13px; text-align: left;
      transition: all 0.15s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* Main content */
    .main { 
      margin-left: 240px; flex: 1; padding: 40px;
      max-width: calc(100vw - 240px);
    }

    /* Cards */
    .card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .card-title { 
      font-size: 16px; font-weight: 600; color: #f4f4f5;
      margin-bottom: 16px;
    }

    /* Welcome */
    .welcome-header { margin-bottom: 28px; }
    .welcome-header h1 { font-size: 28px; font-weight: 700; color: #f4f4f5; }
    .welcome-header h1 span { color: #fbbf24; }
    .welcome-header p { color: #a1a1aa; margin-top: 4px; font-size: 15px; }

    /* Lesson grid */
    .lessons-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .lesson-card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px; padding: 20px;
      cursor: pointer; transition: border-color 0.15s;
      text-decoration: none; display: block;
    }
    .lesson-card:hover { border-color: #3f3f46; }
    .lesson-card-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 10px;
    }
    .module-badge {
      font-size: 11px; font-weight: 600; color: #a1a1aa;
      background: #27272a; padding: 3px 8px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px;
    }
    .status-not-started { background: #27272a; color: #a1a1aa; }
    .status-in-progress { background: #1e3a5f; color: #60a5fa; }
    .status-complete { background: #14532d; color: #4ade80; }
    .lesson-title { 
      font-size: 15px; font-weight: 600; color: #f4f4f5; 
      margin-bottom: 8px; line-height: 1.4;
    }
    .builder-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      color: #fbbf24; background: #1c1712; border: 1px solid #78350f;
      padding: 2px 8px; border-radius: 99px; margin-bottom: 8px;
    }

    /* Section heading */
    .section-heading {
      font-size: 18px; font-weight: 600; color: #f4f4f5;
      margin-bottom: 16px; margin-top: 8px;
    }

    /* Loading state */
    .loading { color: #a1a1aa; font-size: 14px; padding: 20px 0; }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; max-width: 100vw; }
      .lessons-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Auth guard -->
  <script>
    (function() {
      fetch('/api/auth/check', { credentials: 'include' })
        .then(function(r) {
          if (r.status === 401 || r.status === 403) {
            window.location.href = '/login';
          }
          // 500 = server error, do NOT redirect — let user stay
        })
        .catch(function() {
          // Network error only — do not redirect on server errors
        });
    })();
  </script>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/brand/logo-mark.png" alt="PSA">
      <span class="sidebar-logo-text">Pre-Sold<br>Authority</span>
    </div>
    <a href="/dashboard" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z
                 M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z
                 M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z
                 M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
      </svg>
      Dashboard
    </a>
    <a href="/lessons" class="nav-item active">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 
                 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Lessons
    </a>
    <a href="/assets" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 
                 0l-4-4m4 4V4"/>
      </svg>
      My Assets
    </a>
    <a href="/account" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 
                 7 0 00-7-7z"/>
      </svg>
      Account
    </a>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">
    <div class="welcome-header">
      <h1>Your Lessons</h1>
      <p style="color:#a1a1aa;margin-top:4px;">
        5 modules · 8 lessons · Build your authority system step by step
      </p>
    </div>
    <div id="modulesContainer">
      <div class="loading">Loading lessons...</div>
    </div>
  </main>

  <script>
    var MODULE_NAMES = {
      1: 'The Authority Shift',
      2: 'The Pre-Sold Authority System',
      3: 'Authority Content',
      4: 'Inbound Conversations',
      5: 'Installing the System'
    };

    function getStatusBadge(lesson) {
      if (lesson.is_complete) 
        return '<span class="status-badge status-complete">Complete ✓</span>';
      if (lesson.video_watch_percent > 0) 
        return '<span class="status-badge status-in-progress">In Progress</span>';
      return '<span class="status-badge status-not-started">Not Started</span>';
    }

    async function loadLessons() {
      var res = await fetch('/api/lessons', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/login'; return; }
      var data = await res.json();

      var container = document.getElementById('modulesContainer');
      container.innerHTML = '';

      Object.entries(data.modules).forEach(function(entry) {
        var modNum = entry[0];
        var lessons = entry[1];
        var section = document.createElement('div');
        section.style.marginBottom = '32px';
        section.innerHTML = '<h2 style="font-size:18px;font-weight:600;color:#f4f4f5;'
          + 'margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #27272a;">'
          + 'Module ' + modNum + ' — ' + (MODULE_NAMES[modNum] || '')
          + '</h2>'
          + '<div class="lessons-grid">'
          + lessons.map(function(lesson) {
              return '<a class="lesson-card" href="/lessons/lesson.html?id=' + lesson.id + '">'
                + '<div class="lesson-card-top">'
                + '<span class="module-badge">Lesson ' + lesson.lesson_number + '</span>'
                + getStatusBadge(lesson)
                + '</div>'
                + '<div class="lesson-title">' + lesson.title + '</div>'
                + (lesson.builder_completed 
                    ? '<span class="builder-badge">Builder ✓</span>' : '')
                + '</a>';
            }).join('')
          + '</div>';
        container.appendChild(section);
      });
    }

    async function handleLogout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    }

    loadLessons();
  </script>

</body>
</html>
