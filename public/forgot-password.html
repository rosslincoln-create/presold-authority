<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Pre-Sold Authority System</title>
  <link rel="stylesheet" href="/css/style-premium.css">
  <style>
    body { background: #09090b; color: #f4f4f5; font-family: system-ui, sans-serif; margin: 0; }
    :root { --color-bg-surface:#18181b; --color-border:rgba(255,255,255,0.1); --color-text-primary:#f4f4f5; --color-text-secondary:#a1a1aa; --color-accent-gold:#fbbf24; --radius-xl:1rem; --radius-md:0.5rem; --radius-full:9999px; }
    .brand { font-size:1.1rem; font-weight:700; color:#f4f4f5; }
    .brand-accent { color:#fbbf24; }
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { width:100%; max-width:440px; background:var(--color-bg-surface); border:1px solid var(--color-border); border-radius:var(--radius-xl); padding:2.5rem; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-title { font-size:1.75rem; font-weight:700; text-align:center; margin-bottom:0.5rem; }
    .auth-subtitle { text-align:center; color:var(--color-text-secondary); margin-bottom:2rem; font-size:0.95rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-label { display:block; font-size:0.875rem; font-weight:600; color:var(--color-text-primary); margin-bottom:0.5rem; }
    .form-input { width:100%; padding:0.875rem 1rem; background:rgba(9,9,11,0.6); border:1px solid var(--color-border); border-radius:var(--radius-md); color:var(--color-text-primary); font-size:1rem; transition:border-color 0.2s; box-sizing:border-box; }
    .form-input:focus { outline:none; border-color:var(--color-accent-gold); }
    .form-submit { width:100%; padding:1rem; background:linear-gradient(135deg,#fbbf24,#fcd34d); color:#09090b; border:none; border-radius:var(--radius-full); font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
    .form-submit:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(251,191,36,0.4); }
    .form-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .form-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius-md); padding:0.875rem 1rem; color:#fca5a5; font-size:0.875rem; margin-bottom:1rem; display:none; }
    .form-success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:var(--radius-md); padding:0.875rem 1rem; color:#86efac; font-size:0.875rem; margin-bottom:1rem; display:none; }
    .form-footer { text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--color-text-secondary); }
    .form-footer a { color:var(--color-accent-gold); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h3 class="brand">The <span class="brand-accent">Pre-Sold Authority</span> System</h3>
      </div>
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

      <div class="form-error" id="errorMsg"></div>
      <div class="form-success" id="successMsg"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
        <button class="form-submit" type="submit" id="submitBtn">Send Reset Link</button>
      </form>

      <div class="form-footer">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      const errorMsg = document.getElementById('errorMsg')
      const successMsg = document.getElementById('successMsg')

      btn.disabled = true
      btn.textContent = 'Sending...'
      errorMsg.style.display = 'none'
      successMsg.style.display = 'none'

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        })
        const data = await res.json()

        if (res.ok && data.success) {
          successMsg.textContent = data.message
          successMsg.style.display = 'block'
          document.getElementById('forgotForm').style.display = 'none'
        } else {
          errorMsg.textContent = data.error || 'Request failed. Please try again.'
          errorMsg.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Send Reset Link'
        }
      } catch {
        errorMsg.textContent = 'Connection error. Please try again.'
        errorMsg.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      }
    })
  </script>
</body>
</html>
