<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Up Your Account — Pre-Sold Authority System</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style-premium.css">
  <style>
    body { background: #09090b; color: #f4f4f5; font-family: system-ui, sans-serif; margin: 0; }
    .brand { font-size: 1.1rem; font-weight: 700; color: #f4f4f5; }
    .brand-accent { color: #fbbf24; }
    :root {
      --color-bg-surface: #18181b;
      --color-border: rgba(255,255,255,0.1);
      --color-text-primary: #f4f4f5;
      --color-text-secondary: #a1a1aa;
      --color-accent-gold: #fbbf24;
      --radius-xl: 1rem;
      --radius-md: 0.5rem;
      --radius-full: 9999px;
    }
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { width:100%; max-width:440px; background:var(--color-bg-surface); border:1px solid var(--color-border); border-radius:var(--radius-xl); padding:2.5rem; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-title { font-size:1.75rem; font-weight:700; text-align:center; margin-bottom:0.5rem; }
    .auth-subtitle { text-align:center; color:var(--color-text-secondary); margin-bottom:2rem; font-size:0.95rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-label { display:block; font-size:0.875rem; font-weight:600; color:var(--color-text-primary); margin-bottom:0.5rem; }
    .form-input { width:100%; padding:0.875rem 1rem; background:rgba(9,9,11,0.6); border:1px solid var(--color-border); border-radius:var(--radius-md); color:var(--color-text-primary); font-size:1rem; transition:border-color 0.2s; box-sizing:border-box; }
    .form-input:focus { outline:none; border-color:var(--color-accent-gold); }
    .form-submit { width:100%; padding:1rem; background:linear-gradient(135deg,#fbbf24,#fcd34d); color:#09090b; border:none; border-radius:var(--radius-full); font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
    .form-submit:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(251,191,36,0.4); }
    .form-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .form-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius-md); padding:0.875rem 1rem; color:#fca5a5; font-size:0.875rem; margin-bottom:1rem; display:none; }
    .loading-state { text-align:center; padding:2rem; }
    .loading-spinner { width:40px; height:40px; border:3px solid var(--color-border); border-top-color:var(--color-accent-gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="text-align:center; margin-bottom:24px;">
          <img src="/assets/brand/logo-full.png" alt="Pre-Sold Authority" style="height:80px; object-fit:contain;">
        </div>
      </div>

      <!-- Loading state — shown while polling for token -->
      <div id="loadingState" class="loading-state" style="display:none;">
        <div class="loading-spinner"></div>
        <h2 class="auth-title">Finishing your setup...</h2>
        <p class="auth-subtitle">This takes just a moment. Please don't close this page.</p>
      </div>

      <!-- Setup form — shown when token is valid -->
      <div id="setupState" style="display:none;">
        <h1 class="auth-title">You're in. Set your password.</h1>
        <p class="auth-subtitle">Create a password to access your account.</p>
        <div class="form-error" id="errorMsg"></div>
        <form id="activateForm">
          <input type="hidden" id="activationToken" value="">
          <div class="form-group">
            <label class="form-label" for="password">Choose a password</label>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm password</label>
            <input class="form-input" type="password" id="confirmPassword"
                   placeholder="Repeat your password" required autocomplete="new-password">
          </div>
          <button class="form-submit" type="submit" id="submitBtn">Activate My Account</button>
        </form>
      </div>

      <!-- Error state — token invalid/expired -->
      <div id="errorState" style="display:none;">
        <h2 class="auth-title">Link expired</h2>
        <p class="auth-subtitle">Your activation link has expired or is invalid. Please contact support.</p>
        <a href="mailto:support@presoldauthority.com" class="form-submit" style="display:block; text-align:center; text-decoration:none; margin-top:1rem;">Contact Support</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const token = params.get('token')

    async function checkToken(t, attempt = 0) {
      try {
        const res = await fetch(`/api/auth/check-activation?token=${t}`)
        const data = await res.json()

        if (data.valid) {
          document.getElementById('loadingState').style.display = 'none'
          document.getElementById('activationToken').value = t
          document.getElementById('setupState').style.display = 'block'
        } else if (data.pending && attempt < 10) {
          setTimeout(() => checkToken(t, attempt + 1), 3000)
        } else {
          document.getElementById('loadingState').style.display = 'none'
          document.getElementById('errorState').style.display = 'block'
        }
      } catch {
        if (attempt < 10) {
          setTimeout(() => checkToken(t, attempt + 1), 3000)
        } else {
          document.getElementById('loadingState').style.display = 'none'
          document.getElementById('errorState').style.display = 'block'
        }
      }
    }

    if (!token) {
      document.getElementById('errorState').style.display = 'block'
    } else {
      document.getElementById('loadingState').style.display = 'block'
      checkToken(token)
    }

    document.getElementById('activateForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      const errorMsg = document.getElementById('errorMsg')
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirmPassword').value
      const tok = document.getElementById('activationToken').value

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.'
        errorMsg.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Activating...'
      errorMsg.style.display = 'none'

      try {
        const res = await fetch('/api/auth/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: tok, password })
        })
        const data = await res.json()

        if (res.ok && data.success) {
          window.location.href = data.redirectTo || '/onboarding'
        } else {
          errorMsg.textContent = data.error || 'Activation failed. Please try again.'
          errorMsg.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Activate My Account'
        }
      } catch {
        errorMsg.textContent = 'Connection error. Please try again.'
        errorMsg.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Activate My Account'
      }
    })
  </script>
</body>
</html>
